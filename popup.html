<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0F1729;
      color: #E2E8F0;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 8px 0;
      color: #00D4AA;
    }
    p {
      font-size: 12px;
      color: #64748B;
      margin: 0 0 12px 0;
      line-height: 1.4;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: #1E293B;
      border-radius: 6px;
      font-size: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00D4AA;
      flex-shrink: 0;
    }
    .dot.offline { background: #64748B; }
  </style>
</head>
<body>
  <h1>Highcloak</h1>
  <p>Detects personal data in your AI prompts before they leave your machine.</p>
  <div class="status" id="status">
    <span class="dot" id="dot"></span>
    <span id="status-text">Checking...</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
